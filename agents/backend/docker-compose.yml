version: "3.9"

# PrimeDox AI Backend — Docker Compose
# Runs: Ollama (Gemma 3 27B) + PrimeDox Node.js API server
#
# Quick start:
#   cp .env.example .env   # fill in OPENAI_API_KEY if using hybrid mode
#   docker compose up -d
#   docker compose exec ollama ollama pull gemma3:27b
#
# GPU (NVIDIA — required for gemma or hybrid mode):
#   Ensure nvidia-container-toolkit is installed on host
#   Set OLLAMA_NUM_GPU below to your GPU count (default 1)
#
# RunPod / Vast.ai:
#   - Use "RunPod GPU" or "Vast.ai" template with NVIDIA A100 / H100 / RTX 4090
#   - Map ports 3001 (API) and 11434 (Ollama) in the pod settings
#   - Set GEMMA_BASE_URL=http://ollama:11434/v1 (internal Docker network)

services:

  # ── Ollama — local LLM runtime ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: primedox-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-1}
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_NUM_GPU:-1}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── PrimeDox API Server ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: primedox-api
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - GEMMA_BASE_URL=http://ollama:11434/v1
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_models:
    name: primedox-ollama-models
