name: Deploy Weedlaw Education

on:
  push:
    branches: [main]
    paths:
      - 'weedlaw-education/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout primedoxai-deploy
        uses: actions/checkout@v4

      - name: Verify Loop A identity (no Loop B bleed)
        run: |
          BLEED=$(grep -rn "OmniaGuard\|Kiaros\|SoulStack\|CleanSwarm" weedlaw-education/ --include="*.html" | wc -l)
          if [ "$BLEED" -gt 0 ]; then
            echo "FAIL: Loop B brand bleed detected in Weedlaw Education site"
            grep -rn "OmniaGuard\|Kiaros\|SoulStack\|CleanSwarm" weedlaw-education/ --include="*.html"
            exit 1
          fi
          echo "PASS: Zero Loop B bleed"

      - name: Clone weedlaw-education repo
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/franciscoderek7/weedlaw-education.git /tmp/weedlaw-education
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Copy site files
        run: |
          cd weedlaw-education
          for f in *.html; do cp "$f" /tmp/weedlaw-education/"$f" && echo "  copied $f"; done
          for ext in jpg jpeg png webp gif svg js css; do
            for f in *.$ext; do [ -f "$f" ] && cp "$f" /tmp/weedlaw-education/"$f" && echo "  copied $f"; done
          done
          touch /tmp/weedlaw-education/.nojekyll
          echo "All Weedlaw Education files copied"

      - name: Commit and push to weedlaw-education repo
        run: |
          cd /tmp/weedlaw-education
          git config user.email "deploy@franciscoholdings.ca"
          git config user.name "Weedlaw Deploy Bot"
          git add -A
          git diff --cached --stat
          git commit -m "deploy: auto-deploy from primedoxai-deploy @ ${{ github.sha }}" \
            || echo "Nothing to commit — already up to date"
          git push origin main
          echo "Pushed to franciscoderek7/weedlaw-education — live in ~2 minutes"

      - name: Summary
        run: |
          echo ""
          echo "================================================"
          echo "  WEEDLAW EDUCATION DEPLOYED"
          echo "================================================"
          echo "  Repo: franciscoderek7/weedlaw-education (main)"
          echo "  Loop: A (Derek Francisco — cannabis education)"
          echo "  Live in: ~2 minutes (GitHub Pages build)"
          echo ""
          echo "  Check: https://franciscoderek7.github.io/weedlaw-education/"
          echo "================================================"
