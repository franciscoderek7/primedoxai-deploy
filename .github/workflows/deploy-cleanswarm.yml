name: Deploy CleanSwarm to cleanswarm.ca

on:
  push:
    branches: [main]
    paths:
      - 'cleanswarm-checkout/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout primedoxai-deploy
        uses: actions/checkout@v4

      - name: Verify Loop B identity (anonymous — no Derek name, no cannabis)
        run: |
          # CleanSwarm is Loop B — completely anonymous, no cannabis, no Derek Francisco
          DEREK_LEAK=$(grep -rn "Derek Francisco\|franciscoderek7\|Doc Weedlaw\|CCLDR" cleanswarm-checkout/ --include="*.html" | wc -l)
          if [ "$DEREK_LEAK" -gt 0 ]; then
            echo "FAIL: Derek Francisco identity leaked in Loop B site"
            grep -rn "Derek Francisco\|franciscoderek7\|Doc Weedlaw\|CCLDR" cleanswarm-checkout/ --include="*.html"
            exit 1
          fi

          CANNABIS_LEAK=$(grep -rn "cannabis\|marijuana\|weed" cleanswarm-checkout/ --include="*.html" -i | wc -l)
          if [ "$CANNABIS_LEAK" -gt 0 ]; then
            echo "FAIL: Cannabis content found in Loop B CleanSwarm site"
            grep -rn "cannabis\|marijuana\|weed" cleanswarm-checkout/ --include="*.html" -i
            exit 1
          fi

          PERSONAL_LEAK=$(grep -rn "franciscoderek7@gmail\|705-307-8080\|Kent St W\|K9V 2Z8" cleanswarm-checkout/ --include="*.html" | wc -l)
          if [ "$PERSONAL_LEAK" -gt 0 ]; then
            echo "FAIL: Personal info found in Loop B site"
            exit 1
          fi
          echo "PASS: Loop B identity isolation verified — anonymous, zero cannabis, zero personal info"

      - name: Clone cleanswarm repo
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/franciscoderek7/cleanswarm.git /tmp/cleanswarm
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Copy site files
        run: |
          cd cleanswarm-checkout
          for f in *.html; do cp "$f" /tmp/cleanswarm/"$f" && echo "  copied $f"; done
          for ext in jpg jpeg png webp gif svg js css; do
            for f in *.$ext; do [ -f "$f" ] && cp "$f" /tmp/cleanswarm/"$f" && echo "  copied $f"; done
          done
          echo "cleanswarm.ca" > /tmp/cleanswarm/CNAME
          echo "All CleanSwarm files copied"

      - name: Commit and push to cleanswarm repo
        run: |
          cd /tmp/cleanswarm
          git config user.email "deploy@cleanswarm.ca"
          git config user.name "CleanSwarm Deploy Bot"
          git add -A
          git diff --cached --stat
          git commit -m "deploy: auto-deploy from primedoxai-deploy @ ${{ github.sha }}

          CNAME: cleanswarm.ca
          Loop: B (anonymous)
          Triggered by: push to franciscoderek7/primedoxai-deploy main" \
            || echo "Nothing to commit — already up to date"
          git push origin main
          echo "Pushed to franciscoderek7/cleanswarm — live in ~2 minutes"

      - name: Summary
        run: |
          echo ""
          echo "================================================"
          echo "  CLEANSWARM DEPLOYED"
          echo "================================================"
          echo "  Repo: franciscoderek7/cleanswarm (main)"
          echo "  CNAME: cleanswarm.ca"
          echo "  Loop: B (anonymous — no Derek Francisco, no cannabis)"
          echo "  Live in: ~2 minutes (GitHub Pages build)"
          echo ""
          echo "  Check: https://cleanswarm.ca"
          echo "================================================"
