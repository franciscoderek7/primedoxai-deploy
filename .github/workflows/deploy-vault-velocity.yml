name: Deploy Vault Velocity Auto to vaultvelocityauto.com

on:
  push:
    branches: [main]
    paths:
      - 'vault-velocity-auto-site/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout primedoxai-deploy
        uses: actions/checkout@v4

      - name: Verify Loop B identity (no Derek Francisco, no cannabis)
        run: |
          LEAKS=$(grep -rn "franciscoderek7@gmail\|705-307-8080\|Kent St W\|K9V 2Z8\|cannabis\|weed\|marijuana" vault-velocity-auto-site/ --include="*.html" | wc -l)
          if [ "$LEAKS" -gt "0" ]; then
            echo "LOOP B BLEED DETECTED — aborting deploy"
            exit 1
          fi
          echo "Loop B identity check passed"

      - name: Clone vaultvelocityauto repo
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/franciscoderek7/vaultvelocityauto.git /tmp/vaultvelocityauto
          git config --global user.email "deploy@franciscoholdings.com"
          git config --global user.name "Francisco Empire Deploy"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Wipe old files
        run: |
          cd /tmp/vaultvelocityauto
          find . -maxdepth 1 -not -name '.git' -not -name '.' -not -name 'CNAME' -exec rm -rf {} + 2>/dev/null || true

      - name: Copy site files
        run: |
          cp -r vault-velocity-auto-site/. /tmp/vaultvelocityauto/
          echo "vaultvelocityauto.com" > /tmp/vaultvelocityauto/CNAME
          echo "Copied $(ls vault-velocity-auto-site/*.html | wc -l) HTML files"

      - name: Commit and push
        run: |
          cd /tmp/vaultvelocityauto
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy Vault Velocity Auto — $(date -u '+%Y-%m-%d %H:%M UTC')

          Source: vault-velocity-auto-site/ ($(ls /tmp/vaultvelocityauto/*.html 2>/dev/null | wc -l) pages)
          Target: franciscoderek7/vaultvelocityauto → vaultvelocityauto.com"
            git push origin main
            echo "Deployed — live in ~2 minutes"
          fi

      - name: Summary
        run: |
          echo "Vault Velocity Auto deployed"
          echo "  Repo: franciscoderek7/vaultvelocityauto"
          echo "  Domain: vaultvelocityauto.com"
          echo "  Pages: $(ls vault-velocity-auto-site/*.html | wc -l)"
