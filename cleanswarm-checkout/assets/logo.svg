<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- CleanSwarm Hexagonal Swarm Logo -->
  <!-- Dark background -->
  <rect width="200" height="200" rx="24" fill="#111111"/>

  <!-- Centre hex (amber) -->
  <polygon points="100,62 120,73 120,95 100,106 80,95 80,73" fill="#f59e0b" opacity="1"/>

  <!-- Orbiting bee-hex nodes -->
  <!-- Top -->
  <polygon points="100,28 113,35.5 113,50.5 100,58 87,50.5 87,35.5" fill="#fbbf24" opacity="0.85"/>
  <!-- Top-right -->
  <polygon points="131,46 144,53.5 144,68.5 131,76 118,68.5 118,53.5" fill="#f59e0b" opacity="0.7"/>
  <!-- Bottom-right -->
  <polygon points="131,108 144,115.5 144,130.5 131,138 118,130.5 118,115.5" fill="#f59e0b" opacity="0.7"/>
  <!-- Bottom -->
  <polygon points="100,126 113,133.5 113,148.5 100,156 87,148.5 87,133.5" fill="#fbbf24" opacity="0.85"/>
  <!-- Bottom-left -->
  <polygon points="69,108 82,115.5 82,130.5 69,138 56,130.5 56,115.5" fill="#f59e0b" opacity="0.7"/>
  <!-- Top-left -->
  <polygon points="69,46 82,53.5 82,68.5 69,76 56,68.5 56,53.5" fill="#f59e0b" opacity="0.7"/>

  <!-- Connector lines (swarm bonds) -->
  <line x1="100" y1="62" x2="100" y2="58" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="73" x2="118" y2="68.5" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="95" x2="118" y2="115.5" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="106" x2="100" y2="126" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="95" x2="82" y2="115.5" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="73" x2="82" y2="68.5" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>

  <!-- Tiny motion dots — swarm feel -->
  <circle cx="148" cy="84" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="52" cy="84" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="100" cy="170" r="2.5" fill="#fbbf24" opacity="0.4"/>

  <!-- Wordmark: CleanSwarm -->
  <text x="100" y="190" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="800" letter-spacing="1" fill="#f59e0b">CLEANSWARM</text>
</svg>
